<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Finder</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,800" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* الـ Animation الأصلي */
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:Montserrat,sans-serif;background:linear-gradient(-45deg,#EE7752,#E73C7E,#23A6D5,#23D5AB);background-size:400% 400%;animation:gradientBG 15s ease infinite}.container{position:relative;background:#fff;border-radius:10px;box-shadow:0 14px 28px rgba(0,0,0,.25),0 10px 10px rgba(0,0,0,.22);overflow:hidden;width:768px;max-width:100%;min-height:480px}.form-container{position:absolute;top:0;height:100%;transition:all .6s ease-in-out}.sign-in-container{left:-100%;width:50%;z-index:2}.container.right-panel-active .sign-in-container{transform:translateX(100%)}.sign-up-container{left:0;width:50%;z-index:1}.container.right-panel-active .sign-up-container{transform:translateX(100%)}h1{font-weight:800;line-height:1.5;margin-bottom:1.5rem;color:#333;text-align:center;font-size:2.5rem}p{font-size:14px;font-weight:100;line-height:20px;letter-spacing:.5px;margin-bottom:1rem;color:#666;text-align:center}.social-container{margin:0 auto 2rem;width:100%;text-align:center}.social-container a{text-decoration:none;width:100px;height:100px;display:inline-flex;align-items:center;justify-content:center;margin:0 5px;border-radius:50%;font-size:1.8rem;background:var(--color);color:#fff;transition:transform .3s}.social-container a:hover{transform:scale(1.1)}input{display:block;width:100%;padding:1.5rem;margin-bottom:1.5rem;background:#f7f7f7;border:none;border-radius:10px;box-sizing:border-box;font-family:montserrat,sans-serif;font-weight:700;font-size:14px;color:#4a4a4a;text-align:center;transition:border .3s}input:focus{outline:none;border:2px solid #4285f4}button{display:block;width:100%;padding:1.5rem;border:none;background:#4285f4;color:#fff;border-radius:10px;font-family:montserrat,sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:background .3s}.ghost{background:#fff;border:2px solid #fff;color:#4285f4;font-size:14px}a{color:#4285f4;text-decoration:none;font-weight:700}.overlay-container{position:absolute;top:0;left:50%;width:50%;height:100%;overflow:hidden;transition:transform .6s;z-index:100}.container.right-panel-active .overlay-container{transform:translateX(-100%)}.overlay{border-radius:10px;position:relative;transform:translateX(50%);width:200%;height:100%;background:linear-gradient(90deg,#4285f4 50%,#34a853 50%);background-size:400% 400%;animation:gradientBG 15s ease infinite}.overlay-panel{position:relative;width:50%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 4rem}.overlay-left{transform:translateX(-20%)}.container.right-panel-active .overlay-left{transform:translateX(0)}.overlay-right{transform:translateX(0)}.container.right-panel-active .overlay-right{transform:translateX(20%)}.overlay-panel h1{font-weight:800;line-height:1.5;margin-bottom:0;color:#fff;font-size:2rem}.overlay-panel p{font-size:14px;font-weight:100;line-height:20px;letter-spacing:.5px;margin:20px 0 30px;color:#fff}.overlay-panel .ghost{background:#fff;border:2px solid #fff;color:#4285f4}.dashboard-content{padding:20px;max-width:1200px;margin:0 auto}.welcome-box{text-align:center;background:white;padding:40px;border-radius:20px;margin:20px 0;box-shadow:0 20px 40px rgba(0,0,0,.1)}.navbar{background:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 20px rgba(0,0,0,.1)}.nav-buttons i{font-size:24px;cursor:pointer;padding:10px;border-radius:50%;transition:background .3s}.nav-buttons i:hover{background:#f0f0f0}.users-section{margin:30px 20px}.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:25px;margin-top:20px}.user-card{background:white;border-radius:20px;padding:30px;text-align:center;box-shadow:0 15px 35px rgba(0,0,0,.1);transition:all .3s}.user-card:hover{transform:translateY(-10px);box-shadow:0 25px 50px rgba(0,0,0,.15)}.user-photo{width:100px;height:100px;border-radius:50%;margin:0 auto 20px;background-size:cover;background-position:center;border:5px solid #4285f4;box-shadow:0 10px 30px rgba(66,133,244,.3)}.photo-upload-container{margin:15px 0;padding:20px;border:3px dashed #ddd;border-radius:15px;text-align:center;background:#f9f9f9}.photo-btn,.upload-btn{background:linear-gradient(45deg,#4285f4,#34a853);color:white!important;border:none;padding:15px 30px;border-radius:30px;cursor:pointer;font-size:16px;font-weight:700;margin:10px;box-shadow:0 6px 20px rgba(66,133,244,.3);transition:all .3s;display:inline-block}.photo-btn:hover,.upload-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 8px 25px rgba(66,133,244,.4)}.upload-btn:disabled{background:#ccc!important;cursor:not-allowed;transform:none}.photo-preview{margin:20px 0;text-align:center}.photo-preview img{max-width:150px;max-height:150px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.2)}.settings-panel{position:fixed;top:0;right:-400px;width:400px;height:100vh;background:white;box-shadow:-5px 0 20px rgba(0,0,0,.1);transition:right .3s;z-index:1000}.settings-panel.active{right:0}.settings-header{padding:30px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}.setting-item{padding:20px 30px;border-bottom:1px solid #f0f0f0}.setting-item input{width:100%;padding:15px;margin:10px 0;border:1px solid #ddd;border-radius:8px}.logout-btn{background:#ea4335;color:white;width:100%;padding:15px;border:none;border-radius:8px;font-size:16px;cursor:pointer}.view-section{display:none}.view-section.active{display:block}@media(max-width:768px){.users-grid{grid-template-columns:repeat(2,1fr)}.settings-panel{width:100%;right:-100%}}@keyframes gradientBG{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
    </style>
</head>
<body>

<!-- AUTH VIEW مع الـ Animation -->
<div id="auth-view" class="view-section active">
    <div class="container" id="main-container">
        <!-- SIGN UP -->
        <div class="form-container sign-up-container">
            <form id="signUpForm">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" onclick="loginWithGoogle()"><i class="fab fa-google"></i></a>
                </div>
                <span>or use your email</span>
                <input type="text" id="upName" placeholder="Name" required />
                <input type="email" id="upEmail" placeholder="Email" required />
                <input type="password" id="upPassword" placeholder="Password" required />
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <!-- SIGN IN -->
        <div class="form-container sign-in-container">
            <form id="signInForm">
                <h1>Sign In</h1>
                <div class="social-container">
                    <a href="#" onclick="loginWithGoogle()"><i class="fab fa-google"></i></a>
                </div>
                <span>or use your account</span>
                <input type="email" id="inEmail" placeholder="Email" required />
                <input type="password" id="inPassword" placeholder="Password" required />
                <a href="#" onclick="switchView('reset-view')">Forgot Password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>Login to continue</p>
                    <button class="ghost" id="signInToggle">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello Friend!</h1>
                    <p>Upload your photo and join the team</p>
                    <button class="ghost" id="signUpToggle">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- RESET PASSWORD -->
<div id="reset-view" class="view-section">
    <div style="max-width:400px;margin:100px auto;padding:40px;background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);text-align:center;">
        <h1>Reset Password</h1>
        <form id="resetForm">
            <input type="email" id="resetEmail" placeholder="Email Address" required />
            <button type="submit" style="width:100%;padding:15px;margin:20px 0;background:#4285f4;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;">Send Reset Link</button>
        </form>
        <a href="#" onclick="switchView('auth-view')" style="color:#4285f4;">← Back to Login</a>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-view" class="view-section">
    <nav class="navbar">
        <div class="logo">TECHWORLD</div>
        <div class="nav-buttons">
            <i class="fas fa-users" onclick="loadUsers()" title="View Team Photos"></i>
            <i class="fas fa-bars" onclick="toggleSettings()"></i>
        </div>
    </nav>

    <div class="dashboard-content">
        <div class="welcome-box">
            <div id="profilePhotoContainer" class="profile-photo-container">
                <div class="profile-photo" style="background:#ddd url('https://via.placeholder.com/80?text=👤') center/cover;"></div>
            </div>
            <h1>Dashboard</h1>
            <p>Welcome, <span id="display-name-label">User</span>!</p>
            <p id="user-email-display" style="color:#666;font-size:14px;"></p>
        </div>

        <div class="users-section">
            <h2>📸 Team Photos <span id="usersCount">0</span></h2>
            <div id="usersGrid" class="users-grid"></div>
        </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>Account Settings</h3>
            <i class="fas fa-times" onclick="toggleSettings()"></i>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label>Update Name</label>
                <input type="text" id="newNameInput" placeholder="New display name">
                <button onclick="updateName()">Update Name</button>
            </div>
            <div class="setting-item">
                <label>Profile Photo</label>
                <div class="photo-upload-container">
                    <input type="file" id="photoInput" accept="image/*" style="display:none;">
                    <button type="button" id="photoSelectBtn" class="photo-btn">
                        <i class="fas fa-camera"></i> Select Photo
                    </button>
                    <div id="photoPreview" class="photo-preview"></div>
                    <button id="uploadPhotoBtn" class="upload-btn" style="display:none;">
                        <i class="fas fa-save"></i> Save to Firestore
                    </button>
                </div>
            </div>
            <hr>
            <div class="setting-item">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
