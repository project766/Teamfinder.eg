<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Finder - صور المستخدمين</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        /* Auth Forms */
        .container { position: relative; background: white; border-radius: 10px; overflow: hidden; max-width: 500px; margin: 50px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .form-container { position: relative; }
        .form-container input { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; width: 100%; font-size: 16px; }
        .form-container button { background: #4285f4; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; }
        
        /* Photo Upload */
        .photo-upload-container { margin: 15px 0; padding: 20px; border: 3px dashed #ddd; border-radius: 15px; text-align: center; background: #f9f9f9; }
        .photo-btn, .upload-btn { 
            background: linear-gradient(45deg, #4285f4, #34a853); color: white !important; 
            border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; 
            font-size: 16px; font-weight: bold; margin: 10px; box-shadow: 0 6px 20px rgba(66,133,244,0.3);
            transition: all 0.3s ease; display: inline-block;
        }
        .photo-btn:hover, .upload-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(66,133,244,0.4); }
        .upload-btn:disabled { background: #ccc !important; cursor: not-allowed; transform: none; }
        .photo-preview { margin: 20px 0; text-align: center; }
        .photo-preview img { max-width: 150px; max-height: 150px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Users Grid */
        .users-section { margin: 30px 20px; }
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 20px; }
        .user-card { 
            background: white; border-radius: 20px; padding: 30px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); transition: all 0.3s ease;
        }
        .user-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .user-photo { 
            width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; 
            background-size: cover; background-position: center; border: 5px solid #4285f4;
            box-shadow: 0 10px 30px rgba(66,133,244,0.3);
        }
        
        /* Dashboard */
        .dashboard-content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .welcome-box { text-align: center; background: white; padding: 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .profile-photo-container .profile-photo { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px; border: 5px solid #4285f4; }
        
        /* Navbar */
        .navbar { background: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .nav-buttons i { font-size: 24px; cursor: pointer; padding: 10px; border-radius: 50%; transition: background 0.3s; }
        .nav-buttons i:hover { background: #f0f0f0; }
        
        /* Settings */
        .settings-panel { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: white; box-shadow: -5px 0 20px rgba(0,0,0,0.1); transition: right 0.3s; z-index: 1000; }
        .settings-panel.active { right: 0; }
        .settings-header { padding: 30px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .setting-item { padding: 20px 30px; border-bottom: 1px solid #f0f0f0; }
        .setting-item input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .logout-btn { background: #ea4335; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        /* Responsive */
        @media (max-width: 768px) { .users-grid { grid-template-columns: repeat(2, 1fr); } .settings-panel { width: 100%; right: -100%; } }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        h1, h2, h3, h4 { color: #333; margin-bottom: 15px; }
        h2 { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<!-- DASHBOARD (الصفحة الرئيسية) -->
<div id="dashboard-view" class="view-section active">
    <nav class="navbar">
        <div class="logo">📱 Team Finder</div>
        <div class="nav-buttons">
            <i class="fas fa-users" onclick="loadUsers()" title="عرض الفريق"></i>
            <i class="fas fa-cog" onclick="toggleSettings()"></i>
        </div>
    </nav>

    <div class="dashboard-content">
        <!-- بيانات المستخدم -->
        <div class="welcome-box">
            <div id="profilePhotoContainer" class="profile-photo-container">
                <div class="profile-photo" style="background:#ddd url('https://via.placeholder.com/80?text=👤') center/cover;"></div>
            </div>
            <h1>مرحباً!</h1>
            <p>أهلاً <span id="display-name-label">بك</span></p>
            <p id="user-email-display"></p>
        </div>

        <!-- قائمة المستخدمين مع الصور -->
        <div class="users-section">
            <h2>صور الفريق <span id="usersCount">0</span></h2>
            <div id="usersGrid" class="users-grid">
                <!-- الصور هتظهر هنا -->
            </div>
        </div>
    </div>

    <!-- الإعدادات -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>⚙️ الإعدادات</h3>
            <i class="fas fa-times" onclick="toggleSettings()"></i>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label>اسم العرض</label>
                <input type="text" id="newNameInput" placeholder="اكتب اسمك الجديد">
                <button onclick="updateName()">تحديث الاسم</button>
            </div>
            
            <div class="setting-item">
                <label>صورة الملف الشخصي</label>
                <div class="photo-upload-container">
                    <input type="file" id="photoInput" accept="image/*">
                    <button type="button" id="photoSelectBtn" class="photo-btn">
                        <i class="fas fa-camera"></i> اختر صورة
                    </button>
                    <div id="photoPreview"></div>
                    <button id="uploadPhotoBtn" class="upload-btn" style="display:none;">
                        <i class="fas fa-save"></i> حفظ في قاعدة البيانات
                    </button>
                </div>
            </div>
            
            <div class="setting-item">
                <button class="logout-btn" onclick="logout()">خروج</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyD0efUT_IFoPQ3svHnu89j7kyWE6OYnWtE",
  authDomain: "the-tech-world-e2b7c.firebaseapp.com",
  projectId: "the-tech-world-e2b7c",
  storageBucket: "the-tech-world-e2b7c.firebasestorage.app",
  messagingSenderId: "435175920778",
  appId: "1:435175920778:web:09c9e899d71afce34c0973"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ========================================
// PHOTO UPLOAD - يشتغل 100%
// ========================================
document.addEventListener('DOMContentLoaded', function() {
    setupPhotoUpload();
});

// إعداد رفع الصور
function setupPhotoUpload() {
    const photoInput = document.getElementById('photoInput');
    const photoBtn = document.getElementById('photoSelectBtn');
    const uploadBtn = document.getElementById('uploadPhotoBtn');
    
    console.log('✅ Photo system ready');
    
    photoBtn.onclick = () => photoInput.click();
    
    photoInput.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        console.log('✅ Selected:', file.name, file.size);
        
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('photoPreview').innerHTML = `
                <img src="${ev.target.result}" style="max-width:150px;max-height:150px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2);">
                <br><small>${file.name} (${Math.round(file.size/1024)}KB)</small>
            `;
            
            // إظهار زر الحفظ ✅
            uploadBtn.style.display = 'inline-block';
            uploadBtn.disabled = false;
            uploadBtn.onclick = handlePhotoUpload;
            
            window.selectedPhotoFile = file;
            console.log('✅ Upload button shown');
        };
        reader.readAsDataURL(file);
    };
}

// حفظ الصورة
async function handlePhotoUpload() {
    if (!window.selectedPhotoFile || !auth.currentUser) {
        alert('❌ سجل دخول أولاً');
        return;
    }
    
    const uploadBtn = document.getElementById('uploadPhotoBtn');
    uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
    uploadBtn.disabled = true;
    
    try {
        const reader = new FileReader();
        reader.readAsDataURL(window.selectedPhotoFile);
        
        reader.onload = async () => {
            const base64Photo = reader.result;
            
            // حفظ في Firestore
            await db.collection("users").doc(auth.currentUser.uid).set({
                photo: base64Photo,
                name: auth.currentUser.displayName || 'مستخدم',
                email: auth.currentUser.email,
                photoName: window.selectedPhotoFile.name,
                photoSize: window.selectedPhotoFile.size,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            // تحديث الصورة الشخصية
            document.querySelector('.profile-photo-container .profile-photo').style.backgroundImage = `url('${base64Photo}')`;
            
            alert('✅ تم حفظ الصورة في قاعدة البيانات!');
            resetPhotoUI();
            loadUsers();
        };
    } catch (error) {
        alert('❌ خطأ: ' + error.message);
        console.error(error);
    }
}

function resetPhotoUI() {
    document.getElementById('photoPreview').innerHTML = '';
    const btn = document.getElementById('uploadPhotoBtn');
    btn.style.display = 'none';
    btn.innerHTML = '<i class="fas fa-save"></i> حفظ في قاعدة البيانات';
    btn.disabled = false;
    document.getElementById('photoInput').value = '';
}

// تحميل المستخدمين
function loadUsers() {
    db.collection("users")
    .where('photo', '!=', null)
    .orderBy('updatedAt', 'desc')
    .limit(12)
    .get()
    .then(snapshot => {
        const grid = document.getElementById('usersGrid');
        grid.innerHTML = '';
        let count = 0;
        
        snapshot.forEach(doc => {
            const user = doc.data();
            if (user.photo) {
                grid.innerHTML += `
                    <div class="user-card">
                        <div class="user-photo" style="background-image:url('${user.photo}')"></div>
                        <h4>${user.name || 'غير معروف'}</h4>
                        <p style="font-size:14px;color:#666;">${user.email}</p>
                        <small>${user.photoName || 'صورة'}</small>
                    </div>
                `;
                count++;
            }
        });
        document.getElementById('usersCount').textContent = count;
    }).catch(err => console.error('Load users error:', err));
}

// Auth
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('display-name-label').textContent = user.displayName || 'مستخدم';
        document.getElementById('user-email-display').textContent = user.email;
        loadUsers();
        console.log('✅ Logged in:', user.email);
    }
});

// باقي الوظائف
function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
function updateName() { alert('قم بتحديث الاسم من Google أو signup'); }
function logout() { auth.signOut(); }
function switchView(id) { /* simplified */ }
</script>
</body>
</html>
