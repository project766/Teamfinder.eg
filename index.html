<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Partner Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1100px; margin: auto; }
    .hidden { display: none !important; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1, h2, h3 { margin-bottom: 15px; }
    p { color: #dbeafe; margin-bottom: 10px; }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tabs button,
    button {
      background: #3b82f6;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }
    button:hover { background: #2563eb; }
    .secondary-btn { background: #475569; }
    .danger-btn { background: #dc2626; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      margin-bottom: 12px;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: #cbd5e1; }
    select option { color: black; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .profile-card {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .profile-card img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 12px;
      border: 3px solid rgba(255,255,255,0.2);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge {
      display: inline-block;
      background: rgba(59,130,246,0.2);
      color: #bfdbfe;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin: 4px 4px 0 0;
    }
    .preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
      margin-bottom: 12px;
      display: none;
    }
    .message {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(34,197,94,0.15);
      color: #dcfce7;
    }
    .error {
      background: rgba(239,68,68,0.15);
      color: #fecaca;
    }
    .small { font-size: 13px; color: #cbd5e1; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>🎮 Game Partner Finder</h1>
      <div class="actions">
        <button id="goAuthBtn" class="secondary-btn">تسجيل الدخول</button>
        <button id="goProfileBtn" class="secondary-btn hidden">البروفايل</button>
        <button id="goSearchBtn" class="secondary-btn hidden">البحث</button>
        <button id="logoutBtn" class="danger-btn hidden">تسجيل الخروج</button>
      </div>
    </div>

    <section id="authSection" class="card">
      <h2>إنشاء حساب / تسجيل دخول</h2>
      <p>اعمل حسابك، وبعدها كمّل بروفايلك عشان الناس تلاقيك بسهولة.</p>

      <div class="tabs">
        <button id="showLogin">Login</button>
        <button id="showRegister" class="secondary-btn">Sign Up</button>
      </div>

      <div id="loginBox">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" />
        <input type="password" id="loginPassword" placeholder="كلمة المرور" />
        <div class="actions">
          <button id="loginBtn">تسجيل الدخول</button>
          <button id="googleBtn" type="button">Google</button>
        </div>
      </div>

      <div id="registerBox" class="hidden">
        <input type="text" id="registerName" placeholder="الاسم" />
        <input type="email" id="registerEmail" placeholder="البريد الإلكتروني" />
        <input type="password" id="registerPassword" placeholder="كلمة المرور" />
        <button id="registerBtn">إنشاء حساب</button>
      </div>

      <div id="authMessage" class="message hidden"></div>
    </section>

    <section id="profileSection" class="card hidden">
      <h2>إعداد البروفايل</h2>
      <p>املأ بياناتك عشان الناس المناسبة تقدر توصلك.</p>

      <img id="photoPreview" class="preview" alt="preview" />
      <input type="file" id="profilePhoto" accept="image/*" />
      <input type="text" id="profileName" placeholder="اسمك داخل الموقع" />

      <div class="row">
        <select id="profilePlatform">
          <option value="">اختر المنصة</option>
          <option>PC</option>
          <option>PS4</option>
          <option>PS5</option>
          <option>Xbox</option>
          <option>Mobile</option>
        </select>

        <select id="profileGame">
          <option value="">اختر اللعبة</option>
          <option>Rocket League</option>
          <option>Fortnite</option>
          <option>Valorant</option>
          <option>EA FC</option>
          <option>PUBG</option>
          <option>Call of Duty</option>
          <option>Minecraft</option>
          <option>Roblox</option>
        </select>
      </div>

      <div class="row">
        <input type="text" id="profileRank" placeholder="الرانك - مثال: Diamond" />
        <input type="text" id="profileRegion" placeholder="الريجون - مثال: Middle East" />
      </div>

      <textarea id="profileBio" rows="4" placeholder="اكتب نبذة صغيرة عنك أو نوع اللعب اللي تحبه"></textarea>
      <button id="saveProfileBtn">حفظ البروفايل</button>
      <div id="profileMessage" class="message hidden"></div>
    </section>

    <section id="searchSection" class="card hidden">
      <h2>البحث عن لاعبين</h2>
      <p>فلتر حسب اللعبة أو المنصة وشوف اللاعبين المناسبين.</p>

      <div class="row">
        <select id="filterPlatform">
          <option value="">كل المنصات</option>
          <option>PC</option>
          <option>PS4</option>
          <option>PS5</option>
          <option>Xbox</option>
          <option>Mobile</option>
        </select>

        <select id="filterGame">
          <option value="">كل الألعاب</option>
          <option>Rocket League</option>
          <option>Fortnite</option>
          <option>Valorant</option>
          <option>EA FC</option>
          <option>PUBG</option>
          <option>Call of Duty</option>
          <option>Minecraft</option>
          <option>Roblox</option>
        </select>
      </div>

      <button id="searchBtn">ابحث</button>
      <div id="playersContainer" class="grid" style="margin-top: 18px;"></div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

  <script>
    /************************************************
     * 1. INITIALIZE FIREBASE
     ************************************************/
    const firebaseConfig = {
      apiKey: "AIzaSyD0efUT_IFoPQ3svHnu89j7kyWE6OYnWtE",
      authDomain: "the-tech-world-e2b7c.firebaseapp.com",
      projectId: "the-tech-world-e2b7c",
      storageBucket: "the-tech-world-e2b7c.firebasestorage.app",
      messagingSenderId: "435175920778",
      appId: "1:435175920778:web:09c9e899d71afce34c0973"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    /************************************************
     * 2. ELEMENTS
     ************************************************/
    const authSection = document.getElementById('authSection');
    const profileSection = document.getElementById('profileSection');
    const searchSection = document.getElementById('searchSection');

    const goAuthBtn = document.getElementById('goAuthBtn');
    const goProfileBtn = document.getElementById('goProfileBtn');
    const goSearchBtn = document.getElementById('goSearchBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const showLogin = document.getElementById('showLogin');
    const showRegister = document.getElementById('showRegister');
    const loginBox = document.getElementById('loginBox');
    const registerBox = document.getElementById('registerBox');

    const authMessage = document.getElementById('authMessage');
    const profileMessage = document.getElementById('profileMessage');

    const photoInput = document.getElementById('profilePhoto');
    const photoPreview = document.getElementById('photoPreview');

    let selectedPhotoFile = null;
    let currentUserData = null;

    /************************************************
     * 3. HELPERS
     ************************************************/
    function showSection(section) {
      authSection.classList.add('hidden');
      profileSection.classList.add('hidden');
      searchSection.classList.add('hidden');
      section.classList.remove('hidden');
    }

    function setMessage(element, text, type = 'success') {
      element.textContent = text;
      element.classList.remove('hidden', 'error');
      if (type === 'error') element.classList.add('error');
    }

    function clearMessage(element) {
      element.textContent = '';
      element.classList.add('hidden');
      element.classList.remove('error');
    }

    function updateNav(user) {
      if (user) {
        goProfileBtn.classList.remove('hidden');
        goSearchBtn.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
      } else {
        goProfileBtn.classList.add('hidden');
        goSearchBtn.classList.add('hidden');
        logoutBtn.classList.add('hidden');
      }
    }

    function switchAuthTab(type) {
      if (type === 'login') {
        loginBox.classList.remove('hidden');
        registerBox.classList.add('hidden');
        showLogin.classList.remove('secondary-btn');
        showRegister.classList.add('secondary-btn');
      } else {
        registerBox.classList.remove('hidden');
        loginBox.classList.add('hidden');
        showRegister.classList.remove('secondary-btn');
        showLogin.classList.add('secondary-btn');
      }
    }

    /************************************************
     * 4. FIRESTORE SYNC
     ************************************************/
    function syncUserToFirestore(user) {
      if (!user) return Promise.resolve();

      return db.collection('users').doc(user.uid).set({
        uid: user.uid,
        name: user.displayName || 'New User',
        email: user.email,
        phone: user.phoneNumber || 'Not provided',
        photo: user.photoURL || '',
        profileName: user.displayName || '',
        platform: '',
        game: '',
        rank: '',
        region: '',
        bio: '',
        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    async function loadCurrentUserProfile(user) {
      if (!user) return;

      const doc = await db.collection('users').doc(user.uid).get();
      if (!doc.exists) {
        await syncUserToFirestore(user);
      }

      const freshDoc = await db.collection('users').doc(user.uid).get();
      currentUserData = freshDoc.data();

      document.getElementById('profileName').value = currentUserData.profileName || currentUserData.name || '';
      document.getElementById('profilePlatform').value = currentUserData.platform || '';
      document.getElementById('profileGame').value = currentUserData.game || '';
      document.getElementById('profileRank').value = currentUserData.rank || '';
      document.getElementById('profileRegion').value = currentUserData.region || '';
      document.getElementById('profileBio').value = currentUserData.bio || '';

      if (currentUserData.photo) {
        photoPreview.src = currentUserData.photo;
        photoPreview.style.display = 'block';
      } else {
        photoPreview.style.display = 'none';
      }
    }

    async function uploadProfileImage(uid, file) {
      if (!file) return currentUserData?.photo || auth.currentUser?.photoURL || '';

      const ref = storage.ref().child(`profilePhotos/${uid}/${Date.now()}_${file.name}`);
      await ref.put(file);
      return await ref.getDownloadURL();
    }

    /************************************************
     * 5. AUTH ACTIONS
     ************************************************/
    async function registerUser() {
      clearMessage(authMessage);

      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value.trim();

      if (!name || !email || !password) {
        return setMessage(authMessage, 'من فضلك املا كل بيانات التسجيل.', 'error');
      }

      try {
        const res = await auth.createUserWithEmailAndPassword(email, password);
        await res.user.updateProfile({ displayName: name });
        await syncUserToFirestore(res.user);
        setMessage(authMessage, 'تم إنشاء الحساب بنجاح.');
      } catch (err) {
        setMessage(authMessage, err.message, 'error');
      }
    }

    async function loginUser() {
      clearMessage(authMessage);

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        return setMessage(authMessage, 'اكتب الإيميل وكلمة المرور.', 'error');
      }

      try {
        await auth.signInWithEmailAndPassword(email, password);
        setMessage(authMessage, 'تم تسجيل الدخول بنجاح.');
      } catch (err) {
        setMessage(authMessage, err.message, 'error');
      }
    }

    function loginWithGoogle() {
      clearMessage(authMessage);
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });

      auth.signInWithPopup(provider)
        .then(async (result) => {
          await syncUserToFirestore(result.user);
          setMessage(authMessage, 'تم تسجيل الدخول بحساب Google.');
        })
        .catch(err => setMessage(authMessage, err.message, 'error'));
    }

    function logout() {
      auth.signOut();
    }

    /************************************************
     * 6. PROFILE SAVE
     ************************************************/
    async function saveProfile() {
      clearMessage(profileMessage);

      const user = auth.currentUser;
      if (!user) return setMessage(profileMessage, 'لازم تسجل الدخول الأول.', 'error');

      const profileName = document.getElementById('profileName').value.trim();
      const platform = document.getElementById('profilePlatform').value;
      const game = document.getElementById('profileGame').value;
      const rank = document.getElementById('profileRank').value.trim();
      const region = document.getElementById('profileRegion').value.trim();
      const bio = document.getElementById('profileBio').value.trim();

      if (!profileName || !platform || !game) {
        return setMessage(profileMessage, 'الاسم والمنصة واللعبة مطلوبين.', 'error');
      }

      try {
        const photoURL = await uploadProfileImage(user.uid, selectedPhotoFile);

        await db.collection('users').doc(user.uid).set({
          uid: user.uid,
          name: user.displayName || profileName,
          email: user.email,
          photo: photoURL,
          profileName,
          platform,
          game,
          rank,
          region,
          bio,
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        if (profileName !== user.displayName || photoURL !== user.photoURL) {
          await user.updateProfile({
            displayName: profileName,
            photoURL: photoURL || user.photoURL || ''
          });
        }

        selectedPhotoFile = null;
        await loadCurrentUserProfile(user);
        setMessage(profileMessage, 'تم حفظ البروفايل بنجاح.');
      } catch (err) {
        setMessage(profileMessage, err.message, 'error');
      }
    }

    /************************************************
     * 7. SEARCH PLAYERS
     ************************************************/
    async function renderPlayers() {
      const playersContainer = document.getElementById('playersContainer');
      const platform = document.getElementById('filterPlatform').value;
      const game = document.getElementById('filterGame').value;
      const currentUid = auth.currentUser ? auth.currentUser.uid : null;

      playersContainer.innerHTML = '<div class="card"><p>جاري تحميل اللاعبين...</p></div>';

      try {
        let query = db.collection('users');

        if (platform) query = query.where('platform', '==', platform);
        if (game) query = query.where('game', '==', game);

        const snapshot = await query.get();
        let users = snapshot.docs.map(doc => doc.data());

        if (currentUid) {
          users = users.filter(u => u.uid !== currentUid);
        }

        users = users.filter(u => u.profileName && u.platform && u.game);

        if (!users.length) {
          playersContainer.innerHTML = '<div class="card"><p>مفيش لاعبين مطابقين للبحث حاليًا.</p></div>';
          return;
        }

        playersContainer.innerHTML = users.map(user => `
          <div class="profile-card">
            <img src="${user.photo || 'https://via.placeholder.com/100?text=User'}" alt="${user.profileName || user.name}" />
            <h3>${user.profileName || user.name}</h3>
            <span class="badge">🎮 ${user.game}</span>
            <span class="badge">🕹️ ${user.platform}</span>
            ${user.rank ? `<span class="badge">🏆 ${user.rank}</span>` : ''}
            ${user.region ? `<span class="badge">🌍 ${user.region}</span>` : ''}
            <p style="margin-top: 12px;">${user.bio || 'مفيش نبذة متضافة.'}</p>
            <p class="small">${user.email || ''}</p>
          </div>
        `).join('');
      } catch (err) {
        playersContainer.innerHTML = `<div class="card"><p>حصل خطأ: ${err.message}</p></div>`;
      }
    }

    /************************************************
     * 8. EVENTS
     ************************************************/
    showLogin.addEventListener('click', () => switchAuthTab('login'));
    showRegister.addEventListener('click', () => switchAuthTab('register'));

    document.getElementById('registerBtn').addEventListener('click', registerUser);
    document.getElementById('loginBtn').addEventListener('click', loginUser);
    document.getElementById('googleBtn').addEventListener('click', loginWithGoogle);
    document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
    document.getElementById('searchBtn').addEventListener('click', renderPlayers);

    photoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      selectedPhotoFile = file;
      photoPreview.src = URL.createObjectURL(file);
      photoPreview.style.display = 'block';
    });

    goAuthBtn.addEventListener('click', () => showSection(authSection));
    goProfileBtn.addEventListener('click', async () => {
      if (auth.currentUser) await loadCurrentUserProfile(auth.currentUser);
      showSection(profileSection);
    });
    goSearchBtn.addEventListener('click', async () => {
      showSection(searchSection);
      await renderPlayers();
    });
    logoutBtn.addEventListener('click', logout);

    /************************************************
     * 9. AUTH STATE LISTENER
     ************************************************/
    auth.onAuthStateChanged(async (user) => {
      updateNav(user);

      if (user) {
        await syncUserToFirestore(user);
        await loadCurrentUserProfile(user);
        showSection(profileSection);
      } else {
        currentUserData = null;
        selectedPhotoFile = null;
        showSection(authSection);
      }
    });
  </script>
</body>
</html>
