<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="logo.png" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Finder</title>

<link href="https://fonts.googleapis.com/css?family=Montserrat:400,800" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- AUTH VIEW -->
<div id="auth-view" class="view-section active">

<div class="container" id="main-container">

<!-- SIGN UP -->
<div class="form-container sign-up-container">

<form id="signUpForm">

<h1>Create Account</h1>

<div class="social-container">
<a href="#" onclick="loginWithGoogle()">
<i class="fab fa-google"></i>
</a>
</div>

<span>or use your email</span>

<input type="text" id="upName" placeholder="Name" required>
<input type="email" id="upEmail" placeholder="Email" required>
<input type="password" id="upPassword" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>
</div>

<!-- SIGN IN -->
<div class="form-container sign-in-container">

<form id="signInForm">

<h1>Sign In</h1>

<div class="social-container">
<a href="#" onclick="loginWithGoogle()">
<i class="fab fa-google"></i>
</a>
</div>

<span>or use your account</span>

<input type="email" id="inEmail" placeholder="Email" required>
<input type="password" id="inPassword" placeholder="Password" required>

<a href="#" onclick="switchView('reset-view')">Forgot password?</a>

<button type="submit">Sign In</button>

</form>
</div>

<!-- OVERLAY -->
<div class="overlay-container">

<div class="overlay">

<div class="overlay-panel overlay-left">

<h1>Welcome Back</h1>
<button class="ghost" id="signInToggle">Sign In</button>

</div>

<div class="overlay-panel overlay-right">

<h1>Hello Friend</h1>
<button class="ghost" id="signUpToggle">Sign Up</button>

</div>

</div>
</div>

</div>
</div>

<!-- RESET VIEW -->
<div id="reset-view" class="view-section">

<div class="simple-card">

<h1>Reset Password</h1>

<form id="resetForm">

<input type="email" id="resetEmail" placeholder="Email" required>

<button type="submit">Send Reset Link</button>

</form>

<br>

<a href="#" onclick="switchView('auth-view')">Back</a>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-view" class="view-section">

<nav class="navbar">

<div class="logo">TECHWORLD</div>

<div onclick="toggleSettings()">
<i class="fas fa-bars"></i>
</div>

</nav>

<div class="dashboard-content">

<h1>Dashboard</h1>

<p>Welcome <span id="display-name-label"></span></p>

<p id="user-email-display"></p>

<br>

<!-- PROFILE PHOTO -->
<img id="profilePhoto" width="120">

<br><br>

<input type="file" id="photoInput" accept="image/*">

<button onclick="uploadPhoto()">Upload Photo</button>

</div>

<!-- SETTINGS -->
<div id="settings-panel" class="settings-panel">

<h3>Account Settings</h3>

<input type="text" id="newNameInput" placeholder="New name">

<button onclick="updateName()">Update Name</button>

<br><br>

<button onclick="logout()">Logout</button>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
